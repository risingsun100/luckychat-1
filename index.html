<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="오늘의 운세를 확인해보세요! 별들이 당신의 하루를 예언합니다.">
    <meta name="keywords" content="운세, 오늘의운세, 띠운세, 별자리, 타로">
    <title>🔮 오늘의 운세 - Lucky Day</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3em;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #b8b8d1;
            font-size: 1.2em;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: all 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        select option {
            background: #1a1a2e;
            color: white;
        }

        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .zodiac-btn {
            padding: 15px 10px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .zodiac-btn:hover {
            background: rgba(255,215,0,0.2);
            transform: translateY(-3px);
        }

        .zodiac-btn.selected {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            border-color: #ffd700;
        }

        .zodiac-btn .emoji {
            font-size: 2em;
            display: block;
            margin-bottom: 5px;
        }

        .zodiac-btn .name {
            font-size: 0.9em;
        }

        .fortune-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .fortune-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }

        .fortune-btn:active {
            transform: translateY(0);
        }

        .fortune-btn::before {
            content: '✨';
            position: absolute;
            left: 20px;
        }

        .fortune-btn::after {
            content: '✨';
            position: absolute;
            right: 20px;
        }

        .result-section {
            display: none;
            animation: slideUp 0.6s ease;
        }

        .result-section.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            text-align: center;
            padding: 30px;
        }

        .result-emoji {
            font-size: 5em;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-name {
            font-size: 1.8em;
            color: #ffd700;
            margin-top: 15px;
        }

        .result-date {
            color: #b8b8d1;
            margin-top: 5px;
        }

        .fortune-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .fortune-card:hover {
            transform: translateX(5px);
            border-color: #ffd700;
        }

        .fortune-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .fortune-title {
            font-size: 1.2em;
            color: #ffd700;
        }

        .fortune-stars {
            color: #ffd700;
            font-size: 1.1em;
        }

        .fortune-text {
            color: #e8e8e8;
            line-height: 1.6;
        }

        .fortune-meter {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .fortune-meter-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
        }

        .meter-love { background: linear-gradient(90deg, #ff6b6b, #ff8e8e); }
        .meter-money { background: linear-gradient(90deg, #ffd700, #ffed4a); }
        .meter-work { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        .meter-health { background: linear-gradient(90deg, #43e97b, #38f9d7); }

        .lucky-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .lucky-item {
            background: rgba(255,215,0,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .lucky-item .icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .lucky-item .label {
            color: #b8b8d1;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .lucky-item .value {
            color: #ffd700;
            font-size: 1.2em;
            font-weight: bold;
        }

        .advice-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid rgba(255,215,0,0.4);
        }

        .advice-title {
            color: #ffd700;
            font-size: 1.2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .advice-text {
            color: #e8e8e8;
            line-height: 1.8;
        }

        .retry-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .retry-btn:hover {
            background: rgba(255,215,0,0.1);
        }

        .share-section {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .share-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: bold;
        }

        .share-btn.copy {
            background: #5865F2;
            color: white;
        }

        .share-btn.screenshot {
            background: #43e97b;
            color: #1a1a2e;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .loading.show {
            display: block;
        }

        .crystal-ball {
            font-size: 4em;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .loading-text {
            color: #ffd700;
            margin-top: 20px;
            font-size: 1.2em;
        }

        .loading-dots {
            display: inline-block;
        }

        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #b8b8d1;
            font-size: 0.9em;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2em;
            }

            .zodiac-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .lucky-section {
                grid-template-columns: 1fr;
            }

            .zodiac-btn .emoji {
                font-size: 1.5em;
            }

            .card {
                padding: 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <header>

                </div>

                <div class="input-group">
                    <label for="birth">📅 생년월일</label>
                    <input type="date" id="birth" max="9999-12-31">

                <div class="input-group">

                        <button class="zodiac-btn" data-zodiac="양" onclick="selectZodiac(this)">

                <button class="fortune-btn" onclick="showFortune()">운세 보기</button>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="crystal-ball">🔮</div>
            <p class="loading-text">별을 읽고 있습니다<span class="loading-dots"></span></p>

        <div id="resultSection" class="result-section"></div>

        <footer>
            <p>🌟 Lucky day - 매일 새로운 운세를 확인하세요 🌟</p>
        </footer>
    </div>

                        <div class="result-emoji">${zodiacEmojis[selectedZodiac]}</div>
                        <h2 class="result-name">${name}님의 오늘 운세</h2>
                        <p class="result-date">${today}</p>
                    </div>

                    <div class="fortune-card">
                        <div class="fortune-card-header">
                            <span class="fortune-title">💕 애정운</span>
                            <span class="fortune-stars">${getStars(love.score)}</span>
                        </div>
                        <p class="fortune-text">${love.text}</p>
                        <div class="fortune-meter">
                            <div class="fortune-meter-fill meter-love" style="width: ${love.score}%"></div>
                        </div>
                    </div>

                    <div class="fortune-card">
                        <div class="fortune-card-header">
                            <span class="fortune-title">💰 금전운</span>
                            <span class="fortune-stars">${getStars(money.score)}</span>
                        </div>
                        <p class="fortune-text">${money.text}</p>
                        <div class="fortune-meter">
                            <div class="fortune-meter-fill meter-money" style="width: ${money.score}%"></div>
                        </div>
                    </div>

                    <div class="fortune-card">
                        <div class="fortune-card-header">
                            <span class="fortune-title">💼 직업운</span>
                            <span class="fortune-stars">${getStars(work.score)}</span>
                        </div>
                        <p class="fortune-text">${work.text}</p>
                        <div class="fortune-meter">
                            <div class="fortune-meter-fill meter-work" style="width: ${work.score}%"></div>
                        </div>
                    </div>

                    <div class="fortune-card">
                        <div class="fortune-card-header">
                            <span class="fortune-title">🏃 건강운</span>
                            <span class="fortune-stars">${getStars(health.score)}</span>
                        </div>
                        <p class="fortune-text">${health.text}</p>
                        <div class="fortune-meter">
                            <div class="fortune-meter-fill meter-health" style="width: ${health.score}%"></div>
                        </div>
                    </div>

                    <div class="lucky-section">
                        <div class="lucky-item">
                            <div class="icon">🎨</div>
                            <div class="label">행운의 색</div>
                            <div class="value">${luckyColor}</div>
                        </div>
                        <div class="lucky-item">
                            <div class="icon">🔢</div>
                            <div class="label">행운의 숫자</div>
                            <div class="value">${luckyNumber}</div>
                        </div>
                        <div class="lucky-item">
                            <div class="icon">🧭</div>
                            <div class="label">행운의 방향</div>
                            <div class="value">${luckyDirection}</div>
                        </div>
                    </div>

                    <div class="advice-card">
                        <div class="advice-title">💫 오늘의 조언</div>
                        <p class="advice-text">${advice}</p>
                    </div>

                    <div class="share-section">
                        <button class="share-btn copy" onclick="copyResult('${name}', ${totalScore})">📋 결과 복사</button>
                        <button class="share-btn screenshot" onclick="shareResult()">📸 공유하기</button>
                    </div>

                    <button class="retry-btn" onclick="retry()">🔄 다시 보기</button>
                </div>
            `;

            const resultSection = document.getElementById('resultSection');
            resultSection.innerHTML = resultHTML;
            resultSection.classList.add('show');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function retry() {
            document.getElementById('resultSection').classList.remove('show');
            setTimeout(() => {
                document.getElementById('resultSection').innerHTML = '';
                document.getElementById('inputSection').style.display = 'block';
            }, 300);
            
            document.getElementById('name').value = '';
            document.getElementById('birth').value = '';
            document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('selected'));
            selectedZodiac = null;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function copyResult(name, score) {
            const today = new Date().toLocaleDateString('ko-KR');
            const text = `🔮 ${name}님의 오늘의 운세 (${today})

종합 운세: ${score}점
${zodiacEmojis[selectedZodiac]} ${selectedZodiac}띠

오늘도 좋은 하루 되세요! ✨

#오늘의운세 #LuckyDay`;

            navigator.clipboard.writeText(text).then(() => {
                alert('📋 운세 결과가 복사되었습니다!');
            }).catch(() => {
                alert('복사에 실패했습니다. 다시 시도해주세요.');
            });
        }

        function shareResult() {
            if (navigator.share) {
                navigator.share({
                    title: '🔮 오늘의 운세',
                    text: '나의 오늘 운세를 확인했어요!',
                    url: window.location.href
                }).catch(() => {});
            } else {
                alert('📸 스크린샷을 찍어 공유해보세요!\n\nTip: 모바일에서는 공유 기능을 사용할 수 있습니다.');
            }
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('inputSection').style.display !== 'none') {
                showFortune();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('birth').setAttribute('max', today);
        });
    </script>
</body>
</html>
