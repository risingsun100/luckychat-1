<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 오늘의 운세</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 별 배경 효과 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3em;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #b8b8d1;
            font-size: 1.2em;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: all 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        select option {
            background: #1a1a2e;
            color: white;
        }

        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .zodiac-btn {
            padding: 15px 10px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .zodiac-btn:hover {
            background: rgba(255,215,0,0.2);
            transform: translateY(-3px);
        }

        .zodiac-btn.selected {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            border-color: #ffd700;
        }

        .zodiac-btn .emoji {
            font-size: 2em;
            display: block;
            margin-bottom: 5px;
        }

        .zodiac-btn .name {
            font-size: 0.9em;
        }

        .fortune-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .fortune-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }

        .fortune-btn:active {
            transform: translateY(0);
        }

        .fortune-btn::before {
            content: '✨';
            position: absolute;
            left: 20px;
        }

        .fortune-btn::after {
            content: '✨';
            position: absolute;
            right: 20px;
        }

        /* 결과 섹션 */
        .result-section {
            display: none;
            animation: slideUp 0.6s ease;
        }

        .result-section.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            text-align: center;
            padding: 30px;
        }

        .result-emoji {
            font-size: 5em;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-name {
            font-size: 1.8em;
            color: #ffd700;
            margin-top: 15px;
        }

        .result-date {
            color: #b8b8d1;
            margin-top: 5px;
        }

        .fortune-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .fortune-card:hover {
            transform: translateX(5px);
            border-color: #ffd700;
        }

        .fortune-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .fortune-title {
            font-size: 1.2em;
            color: #ffd700;
        }

        .fortune-stars {
            color: #ffd700;
            font-size: 1.1em;
        }

        .fortune-text {
            color: #e8e8e8;
            line-height: 1.6;
        }

        .fortune-meter {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .fortune-meter-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
        }

        .meter-love { background: linear-gradient(90deg, #ff6b6b, #ff8e8e); }
        .meter-money { background: linear-gradient(90deg, #ffd700, #ffed4a); }
        .meter-work { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        .meter-health { background: linear-gradient(90deg, #43e97b, #38f9d7); }

        .lucky-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .lucky-item {
            background: rgba(255,215,0,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .lucky-item .icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .lucky-item .label {
            color: #b8b8d1;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .lucky-item .value {
            color: #ffd700;
            font-size: 1.2em;
            font-weight: bold;
        }

        .advice-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid rgba(255,215,0,0.4);
        }

        .advice-title {
            color: #ffd700;
            font-size: 1.2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .advice-text {
            color: #e8e8e8;
            line-height: 1.8;
        }

        .retry-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .retry-btn:hover {
            background: rgba(255,215,0,0.1);
        }

        .share-section {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .share-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .share-btn.copy {
            background: #5865F2;
            color: white;
        }

        .share-btn.screenshot {
            background: #43e97b;
            color: #1a1a2e;
        }

        .share-btn:hover {
            transform: translateY(-2px);
        }

        /* 로딩 애니메이션 */
        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .loading.show {
            display: block;
        }

        .crystal-ball {
            font-size: 4em;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .loading-text {
            color: #ffd700;
            margin-top: 20px;
            font-size: 1.2em;
        }

        /* 반응형 */
        @media (max-width: 480px) {
            h1 {
                font-size: 2em;
            }

            .zodiac-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .lucky-section {
                grid-template-columns: 1fr;
            }

            .zodiac-btn .emoji {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <header>
            <h1>🔮 오늘의 운세</h1>
            <p class="subtitle">별들이 당신의 하루를 예언합니다</p>
        </header>

        <!-- 입력 섹션 -->
        <div id="inputSection">
            <div class="card">
                <div class="input-group">
                    <label>👤 이름</label>
                    <input type="text" id="name" placeholder="이름을 입력하세요">
                </div>

                <div class="input-group">
                    <label>📅 생년월일</label>
                    <input type="date" id="birth">
                </div>

                <div class="input-group">
                    <label>🐾 띠를 선택하세요</label>
                    <div class="zodiac-grid">
                        <button class="zodiac-btn" data-zodiac="쥐" onclick="selectZodiac(this)">
                            <span class="emoji">🐭</span>
                            <span class="name">쥐</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="소" onclick="selectZodiac(this)">
                            <span class="emoji">🐮</span>
                            <span class="name">소</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="호랑이" onclick="selectZodiac(this)">
                            <span class="emoji">🐯</span>
                            <span class="name">호랑이</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="토끼" onclick="selectZodiac(this)">
                            <span class="emoji">🐰</span>
                            <span class="name">토끼</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="용" onclick="selectZodiac(this)">
                            <span class="emoji">🐲</span>
                            <span class="name">용</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="뱀" onclick="selectZodiac(this)">
                            <span class="emoji">🐍</span>
                            <span class="name">뱀</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="말" onclick="selectZodiac(this)">
                            <span class="emoji">🐴</span>
                            <span class="name">말</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="양" onclick="selectZodiac(this)">
                            <span class="emoji">🐑</span>
                            <span class="name">양</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="원숭이" onclick="selectZodiac(this)">
                            <span class="emoji">🐵</span>
                            <span class="name">원숭이</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="닭" onclick="selectZodiac(this)">
                            <span class="emoji">🐔</span>
                            <span class="name">닭</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="개" onclick="selectZodiac(this)">
                            <span class="emoji">🐶</span>
                            <span class="name">개</span>
                        </button>
                        <button class="zodiac-btn" data-zodiac="돼지" onclick="selectZodiac(this)">
                            <span class="emoji">🐷</span>
                            <span class="name">돼지</span>
                        </button>
                    </div>
                </div>

                <button class="fortune-btn" onclick="showFortune()">운세 보기</button>
            </div>
        </div>

        <!-- 로딩 -->
        <div id="loading" class="loading">
            <div class="crystal-ball">🔮</div>
            <p class="loading-text">별을 읽고 있습니다...</p>
        </div>

        <!-- 결과 섹션 -->
        <div id="resultSection" class="result-section"></div>
    </div>

    <script>
        // 별 배경 생성
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                starsContainer.appendChild(star);
            }
        }
        createStars();

        let selectedZodiac = null;

        const zodiacEmojis = {
            "쥐": "🐭", "소": "🐮", "호랑이": "🐯", "토끼": "🐰",
            "용": "🐲", "뱀": "🐍", "말": "🐴", "양": "🐑",
            "원숭이": "🐵", "닭": "🐔", "개": "🐶", "돼지": "🐷"
        };

        const fortunes = {
            love: [
                { text: "오늘은 운명적인 만남이 기다리고 있습니다. 평소와 다른 곳에서 특별한 인연을 만날 수 있어요.", score: 95 },
                { text: "사랑하는 사람과의 관계가 더욱 깊어지는 날입니다. 진심을 담은 대화를 나눠보세요.", score: 88 },
                { text: "솔직한 마음을 전하기에 좋은 날입니다. 용기를 내어 고백해보는 건 어떨까요?", score: 82 },
                { text: "작은 오해가 생길 수 있으니 상대방의 말에 귀 기울여 보세요.", score: 65 },
                { text: "혼자만의 시간이 필요한 날입니다. 자신을 돌보는 시간을 가져보세요.", score: 55 },
                { text: "새로운 만남보다는 기존 관계를 돌아보기 좋은 날입니다.", score: 70 }
            ],
            money: [
                { text: "예상치 못한 행운이 찾아옵니다! 복권이나 이벤트에 당첨될 수 있어요.", score: 92 },
                { text: "투자에 좋은 기회가 올 수 있습니다. 단, 신중한 판단이 필요해요.", score: 78 },
                { text: "지출을 조심하세요. 충동구매를 자제하면 좋겠습니다.", score: 58 },
                { text: "재물운이 상승하는 날입니다. 새로운 수입원이 생길 수 있어요.", score: 85 },
                { text: "저축을 시작하기에 좋은 날입니다. 작은 금액부터 시작해보세요.", score: 72 },
                { text: "금전적인 도움을 받을 수 있는 날입니다. 주변 사람들의 조언에 귀 기울이세요.", score: 80 }
            ],
            work: [
                { text: "업무에서 큰 성과를 거둘 수 있는 날입니다! 자신감을 가지세요.", score: 95 },
                { text: "새로운 프로젝트를 시작하기에 최적의 날입니다.", score: 88 },
                { text: "동료와의 협력이 빛을 발하는 날입니다. 팀워크를 발휘해보세요.", score: 82 },
                { text: "차분하게 일을 처리하면 좋은 결과가 있을 거예요.", score: 75 },
                { text: "오늘은 무리하지 말고 컨디션 조절에 신경 쓰세요.", score: 60 },
                { text: "창의적인 아이디어가 떠오르는 날입니다. 메모해두세요!", score: 85 }
            ],
            health: [
                { text: "에너지가 넘치는 날입니다! 새로운 운동을 시작해보세요.", score: 92 },
                { text: "가벼운 산책이나 스트레칭으로 몸을 풀어주세요.", score: 78 },
                { text: "충분한 수면이 필요합니다. 일찍 잠자리에 드세요.", score: 65 },
                { text: "식단 관리에 신경 쓰면 좋겠습니다. 채소를 많이 드세요.", score: 70 },
                { text: "스트레스 관리가 필요한 날입니다. 명상이나 요가를 추천해요.", score: 68 },
                { text: "컨디션이 매우 좋은 날입니다! 하고 싶은 활동을 마음껏 즐기세요.", score: 90 }
            ]
        };

        const advices = [
            "오늘 하루도 당신은 충분히 잘하고 있습니다. 자신을 믿으세요!",
            "작은 친절이 큰 행운을 불러옵니다. 주변 사람들에게 따뜻한 말 한마디를 건네보세요.",
            "새로운 시도를 두려워하지 마세요. 변화가 행운을 가져다줄 거예요.",
            "오늘은 직감을 믿어보세요. 당신의 느낌이 맞을 가능성이 높습니다.",
            "감사하는 마음으로 하루를 시작하면 좋은 일이 찾아올 거예요.",
            "급하게 결정하지 말고 한 박자 쉬어가세요. 여유가 지혜를 만듭니다."
        ];

        const luckyColors = ["빨강", "주황", "노랑", "초록", "파랑", "보라", "핑크", "흰색", "검정", "금색"];
        const luckyNumbers = [1, 3, 5, 7, 8, 9, 11, 13, 17, 21, 23, 27];
        const luckyDirections = ["동쪽", "서쪽", "남쪽", "북쪽", "동남쪽", "서북쪽"];

        function selectZodiac(btn) {
            document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedZodiac = btn.dataset.zodiac;
        }

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getStars(score) {
            const fullStars = Math.floor(score / 20);
            const halfStar = (score % 20) >= 10 ? 1 : 0;
            return '★'.repeat(fullStars) + (halfStar ? '☆' : '') + '☆'.repeat(5 - fullStars - halfStar);
        }

        function showFortune() {
            const name = document.getElementById('name').value;
            const birth = document.getElementById('birth').value;

            if (!name) {
                alert('이름을 입력해주세요!');
                return;
            }
            if (!birth) {
                alert('생년월일을 선택해주세요!');
                return;
            }
            if (!selectedZodiac) {
                alert('띠를 선택해주세요!');
                return;
            }

            // 로딩 표시
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('loading').classList.add('show');

            // 1.5초 후 결과 표시
            setTimeout(() => {
                document.getElementById('loading').classList.remove('show');
                displayResult(name, birth);
            }, 1500);
        }

        function displayResult(name, birth) {
            const love = getRandomItem(fortunes.love);
            const money = getRandomItem(fortunes.money);
            const work = getRandomItem(fortunes.work);
            const health = getRandomItem(fortunes.health);
            const advice = getRandomItem(advices);
            const luckyColor = getRandomItem(luckyColors);
            const luckyNumber = getRandomItem(luckyNumbers);
            const luckyDirection = getRandomItem(luckyDirections);

            const today = new Date().toLocaleDateString('ko-KR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });

            const resultHTML = `
                <div class="result-header">
                    <div class="result-emoji">${zodiacEmojis[selectedZodiac]}</div>
                    <h2 class="result-name">${name}님의 오늘 운세</h2>
                    <p class="result-date">${today}</p>
                </div>

                <div class="fortune-card">
                    <div class="fortune-card-header">
                        <span class="fortune-title">💕 애정운</span>
                        <span class="fortune-stars">${getStars(love.score)}</span>
                    </div>
                    <p class="fortune-text">${love.text}</p>
                    <div class="fortune-meter">
                        <div class="fortune-meter-fill meter-love" style="width: ${love.score}%"></div>
                    </div>
                </div>

                <div class="fortune-card">
                    <div class="fortune-card-header">
                        <span class="fortune-title">💰 금전운</span>
                        <span class="fortune-stars">${getStars(money.score)}</span>
                    </div>
                    <p class="fortune-text">${money.text}</p>
                    <div class="fortune-meter">
                        <div class="fortune-meter-fill meter-money" style="width: ${money.score}%"></div>
                    </div>
                </div>

                <div class="fortune-card">
                    <div class="fortune-card-header">
                        <span class="fortune-title">💼 직업운</span>
                        <span class="fortune-stars">${getStars(work.score)}</span>
                    </div>
                    <p class="fortune-text">${work.text}</p>
                    <div class="fortune-meter">
                        <div class="fortune-meter-fill meter-work" style="width: ${work.score}%"></div>
                    </div>
                </div>

                <div class="fortune-card">
                    <div class="fortune-card-header">
                        <span class="fortune-title">🏃 건강운</span>
                        <span class="fortune-stars">${getStars(health.score)}</span>
                    </div>
                    <p class="fortune-text">${health.text}</p>
                    <div class="fortune-meter">
                        <div class="fortune-meter-fill meter-health" style="width: ${health.score}%"></div>
                    </div>
                </div>

                <div class="lucky-section">
                    <div class="lucky-item">
                        <div class="icon">🎨</div>
                        <div class="label">행운의 색</div>
                        <div class="value">${luckyColor}</div>
                    </div>
                    <div class="lucky-item">
                        <div class="icon">🔢</div>
                        <div class="label">행운의 숫자</div>
                        <div class="value">${luckyNumber}</div>
                    </div>
                    <div class="lucky-item">
                        <div class="icon">🧭</div>
                        <div class="label">행운의 방향</div>
                        <div class="value">${luckyDirection}</div>
                    </div>
                </div>

                <div class="advice-card">
                    <div class="advice-title">💫 오늘의 조언</div>
                    <p class="advice-text">${advice}</p>
                </div>

                <div class="share-section">
                    <button class="share-btn copy" onclick="copyResult()">📋 결과 복사</button>
                    <button class="share-btn screenshot" onclick="alert('스크린샷을 찍어 공유해보세요!')">📸 공유하기</button>
                </div>

                <button class="retry-btn" onclick="retry()">🔄 다시 보기</button>
            `;

            const resultSection = document.getElementById('resultSection');
            resultSection.innerHTML = resultHTML;
            resultSection.classList.add('show');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function retry() {
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('resultSection').innerHTML = '';
            document.getElementById('inputSection').style.display = 'block';
            
            // 초기화
            document.getElementById('name').value = '';
            document.getElementById('birth').value = '';
            document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('selected'));
            selectedZodiac = null;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function copyResult() {
            const name = document.getElementById('name').value;
            const text = `🔮 ${name}님의 오늘의 운세\n\n오늘 운세 사이트에서 확인해보세요!`;
            navigator.clipboard.writeText(text).then(() => {
                alert('결과가 복사되었습니다!');
            });
        }

        // Enter 키로 운세 보기
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('inputSection').style.display !== 'none') {
                showFortune();
            }
        });
    </script>
</body>
</html>
